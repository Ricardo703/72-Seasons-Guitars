<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>72 Seasons Guitar Shop</title>

    <link rel="stylesheet" href="./styles/home_page.css">

    <script type="module" src="./../controller/home_page.js" defer></script>
</head>

<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <a href="home_page.html" class="logo-link">
                    <span class="logo-sub">72 SEASONS GUITARS</span>
                </a>
            </div>

            <nav class="main-nav">
                <ul class="nav-list">
                    <li class="nav-item"><a href="home_page.html" class="nav-link active">Home</a></li>
                    <li class="nav-item"><a href="../../discografia_page/view/discografia.html"
                            class="nav-link">Discografia</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Sobre</a></li>
                </ul>
                <div class="nav-actions">
                    <a href="#" class="btn-login">Sign Out</a>
                    <a href="#" id="header-cart-btn" class="btn-cart" onclick="showModalCart()">🛒 CARRINHO (<span
                            id="cart-count">0</span>)</a>
                </div>
            </nav>
        </div>
        <div class="header-bar"></div>
    </header>

    <main class="main-content">
        <div class="welcome-section">

            <nav id="nav-banner">
                <div id="btn-banner-esquerdo" onclick="moverBanner('E')">&lt;</div>
                <div id="banner">
                    <div id="navegacao-banner">
                        <div
                            style="background-image: url('https://cdn.media.amplience.net/i/metallica/Metallica_Group_72Seasons_Tim-Saccenti_04'); background-size: cover;">
                        </div>
                        <div
                            style="background-image: url('https://rollingstone.com.br/wp-content/uploads/megadeth-banda-metal-rock-kiko-loureiro-dave-mustaine-foto-divulgacao.jpeg'); background-size: cover;">
                        </div>
                    </div>
                </div>
                <div id="btn-banner-direito" onclick="moverBanner('D')">&gt;</div>
            </nav>

            <section id="cards-section">
            </section>
        </div>
    </main>

    <!-- Carrinho -->
    <div id="cart-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button id="close-cart-btn" class="close-btn" onclick="closeModalCart()">X Fechar</button>
            <div class="cart-container-layout">
                <section class="cart-items-section">
                    <h2 class="cart-section-title">SEU CARRINHO</h2>
                    <div id="cart-items-list"></div>
                </section>
                <aside class="cart-summary-section" id="summary-container">
                </aside>
            </div>
        </div>
    </div>

    <div id="details-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button id="close-details-btn" class="close-btn" onclick="fecharDetalhesProduto()">X Fechar</button>
            <div id="root-detalhes"></div>
        </div>
    </div>

    <!-- Modal de Edição de Produto -->
    <div id="edit-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button id="close-edit-btn" class="close-btn">X Fechar</button>
            <h2 class="cart-section-title" style="margin-bottom: 20px;">Editar Produto</h2>

            <form id="edit-product-form">
                <!-- Input oculto para armazenar o ID do produto -->
                <input type="hidden" id="edit-product-id">

                <div class="form-group">
                    <label for="edit-product-name">Nome do Produto:</label>
                    <input type="text" id="edit-product-name" required>
                </div>

                <div class="form-group">
                    <label for="edit-product-price">Preço ($):</label>
                    <input type="number" id="edit-product-price" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label for="edit-product-image">URL da Imagem:</label>
                    <input type="url" id="edit-product-image" required>
                </div>

                <button type="submit" class="btn-save">Salvar Alterações</button>
                <button type="button" id="delete-product-btn" class="btn-delete">Excluir Produto</button>
            </form>
        </div>
    </div>

    <!-- Modal de Cadastro de Produto -->
    <div id="add-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button id="close-add-btn" class="close-btn">X Fechar</button>
            <h2 class="cart-section-title" style="margin-bottom: 20px;">Cadastrar Novo Produto</h2>

            <form id="add-product-form">
                <div class="form-group">
                    <label for="add-product-name">Nome do Produto:</label>
                    <input type="text" id="add-product-name" required>
                </div>

                <div class="form-group">
                    <label for="add-product-price">Preço ($):</label>
                    <input type="number" id="add-product-price" step="0.01" min="0" required>
                </div>

                <div class="form-group">
                    <label for="add-product-image">URL da Imagem:</label>
                    <input type="url" id="add-product-image" required>
                </div>

                <button type="submit" class="btn-save">Cadastrar Produto</button>
            </form>
        </div>
    </div>

</body>

</html>
